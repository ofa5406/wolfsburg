<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0A0A0A"/>
    </marker>
  </defs>
  <rect width="1200" height="820" fill="#EAEAEA"/>

  <!-- header -->
  <text x="60" y="52" font-size="13" letter-spacing="3" fill="rgba(10,10,10,0.6)">(EXHIBITION — SUMMAERY 2026)</text>
  <text x="60" y="84" font-size="26" font-weight="bold" fill="#0A0A0A">01 · Station layout — computer pool (schematic)</text>
  <line x1="60" y1="100" x2="1140" y2="100" stroke="rgba(10,10,10,0.15)" stroke-width="1"/>

  <!-- room shell -->
  <rect x="90" y="130" width="880" height="560" fill="#F5F4EF" stroke="#0A0A0A" stroke-width="3"/>
  <!-- door opening bottom left -->
  <line x1="150" y1="690" x2="230" y2="690" stroke="#F5F4EF" stroke-width="5"/>
  <path d="M150,690 A80,80 0 0 1 230,610" fill="none" stroke="rgba(10,10,10,0.4)" stroke-width="1.5"/>
  <text x="160" y="716" font-size="14" fill="#0A0A0A">Entrance</text>
  <line x1="190" y1="660" x2="270" y2="590" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- taped parking space (1 m = 62 px  → 5.0 x 2.5 m = 310 x 155) -->
  <rect x="430" y="330" width="310" height="155" fill="none" stroke="#E8500A" stroke-width="5" stroke-dasharray="18 10"/>
  <text x="585" y="400" font-size="16" font-weight="bold" fill="#E8500A" text-anchor="middle">C · ONE PARKING SPACE</text>
  <text x="585" y="422" font-size="13" fill="#0A0A0A" text-anchor="middle">5.0 × 2.5 m — taped on the floor</text>
  <!-- dimensions -->
  <line x1="430" y1="510" x2="740" y2="510" stroke="rgba(10,10,10,0.6)" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="585" y="530" font-size="12" fill="rgba(10,10,10,0.6)" text-anchor="middle">5.0 m</text>
  <line x1="770" y1="330" x2="770" y2="485" stroke="rgba(10,10,10,0.6)" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="782" y="412" font-size="12" fill="rgba(10,10,10,0.6)">2.5 m</text>
  <!-- caption strip -->
  <rect x="430" y="492" width="310" height="10" fill="#0A0A0A"/>
  <text x="585" y="482" font-size="11" fill="rgba(10,10,10,0.6)" text-anchor="middle" opacity="0">.</text>

  <!-- projector plinth + throw cone -->
  <rect x="800" y="380" width="44" height="44" fill="#0A0A0A"/>
  <text x="822" y="446" font-size="12" fill="#0A0A0A" text-anchor="middle">XGIMI</text>
  <text x="822" y="462" font-size="12" fill="#0A0A0A" text-anchor="middle">on plinth</text>
  <path d="M800,402 L740,340 L740,478 Z" fill="#E8500A" opacity="0.18"/>

  <!-- A1: loop screen on top wall -->
  <rect x="330" y="130" width="220" height="16" fill="#0A0A0A"/>
  <rect x="395" y="158" width="90" height="34" fill="none" stroke="#0A0A0A" stroke-width="2"/>
  <text x="440" y="180" font-size="12" fill="#0A0A0A" text-anchor="middle">PC / kiosk</text>
  <text x="330" y="222" font-size="15" font-weight="bold" fill="#0A0A0A">A1 · The 60-Second City</text>
  <text x="330" y="240" font-size="12" fill="rgba(10,10,10,0.6)">loop, faces the entrance · touch → full deck</text>
  <line x1="440" y1="250" x2="330" y2="580" stroke="rgba(10,10,10,0.3)" stroke-width="1" stroke-dasharray="4 5"/>
  <text x="300" y="600" font-size="11" fill="rgba(10,10,10,0.4)">sightline from door</text>

  <!-- title wall, top-left -->
  <rect x="120" y="130" width="150" height="16" fill="#E8500A"/>
  <text x="120" y="170" font-size="14" font-weight="bold" fill="#0A0A0A">Title wall</text>
  <text x="120" y="188" font-size="12" fill="rgba(10,10,10,0.6)">A1 poster + 2 QR</text>

  <!-- A2: hub anatomy on left wall -->
  <rect x="90" y="330" width="16" height="130" fill="#0A0A0A"/>
  <rect x="118" y="360" width="90" height="60" fill="none" stroke="#0A0A0A" stroke-width="2"/>
  <text x="163" y="395" font-size="12" fill="#0A0A0A" text-anchor="middle">PC + mouse</text>
  <text x="120" y="330" font-size="15" font-weight="bold" fill="#0A0A0A" transform="translate(0,-12)">A2 · Hub Anatomy</text>
  <text x="120" y="336" font-size="12" fill="rgba(10,10,10,0.6)">hub-viewer/ · hover to learn · offline</text>

  <!-- B: tablet at parking space edge -->
  <rect x="452" y="560" width="70" height="46" fill="none" stroke="#0A0A0A" stroke-width="2"/>
  <rect x="470" y="572" width="34" height="22" fill="#0A0A0A"/>
  <text x="452" y="632" font-size="15" font-weight="bold" fill="#0A0A0A">B · Choose a Life</text>
  <text x="452" y="650" font-size="12" fill="rgba(10,10,10,0.6)">tablet, deck #s04 · ticket rack beside</text>
  <circle cx="545" cy="583" r="4" fill="#E8500A"/>
  <text x="556" y="588" font-size="11" fill="rgba(10,10,10,0.6)">tickets</text>

  <!-- participation map on right wall -->
  <rect x="954" y="200" width="16" height="240" fill="#E8500A"/>
  <text x="940" y="180" font-size="15" font-weight="bold" fill="#0A0A0A" text-anchor="end">Participation map</text>
  <text x="940" y="198" font-size="12" fill="rgba(10,10,10,0.6)" text-anchor="end">“Where would you put a hub?”</text>
  <text x="940" y="216" font-size="12" fill="rgba(10,10,10,0.6)" text-anchor="end">tiled A3 masterplan + stickers</text>
  <circle cx="928" cy="250" r="4" fill="#E8500A"/><circle cx="918" cy="290" r="4" fill="#E8500A"/><circle cx="932" cy="330" r="4" fill="#E8500A"/>

  <!-- visitor flow -->
  <path d="M250,600 C330,520 360,300 430,240" fill="none" stroke="#E8500A" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M480,250 C520,300 540,310 560,326" fill="none" stroke="#E8500A" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M745,410 C820,430 880,380 940,340" fill="none" stroke="#E8500A" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1000" y="470" font-size="12" fill="#E8500A">act, then leave</text>

  <!-- legend -->
  <line x1="60" y1="730" x2="1140" y2="730" stroke="rgba(10,10,10,0.15)" stroke-width="1"/>
  <rect x="60" y="752" width="26" height="10" fill="#0A0A0A"/>
  <text x="96" y="762" font-size="13" fill="#0A0A0A">screen / device</text>
  <rect x="240" y="748" width="26" height="14" fill="none" stroke="#E8500A" stroke-width="3" stroke-dasharray="8 5"/>
  <text x="276" y="762" font-size="13" fill="#0A0A0A">floor tape</text>
  <line x1="390" y1="756" x2="430" y2="756" stroke="#E8500A" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="762" font-size="13" fill="#0A0A0A">visitor flow</text>
  <text x="1140" y="762" font-size="12" fill="rgba(10,10,10,0.4)" text-anchor="end">schematic — adapt to the real pool room after measuring (checklist, week 1)</text>
</svg>
